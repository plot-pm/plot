name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate skills parse
        run: pnpm test

      - name: Validate skill frontmatter
        run: pnpm run validate

      - name: Reconcile contract tests
        run: pnpm run test:reconcile

      # ── Board (first-class): the Definition of Done requires the board to keep
      #    working. Typecheck, tests, and a fresh build are gated here. ──────────
      - name: Board typecheck
        run: pnpm run typecheck

      - name: Board build + artifact freshness
        run: |
          pnpm run build:board
          if ! git diff --quiet -- skills/plot/scripts/board/board-server.mjs; then
            echo "::error::skills/plot/scripts/board/board-server.mjs is stale — run 'pnpm build:board' and commit the result."
            git --no-pager diff --stat -- skills/plot/scripts/board/board-server.mjs
            exit 1
          fi
          echo "Board artifact is fresh."

      - name: Board tests
        run: pnpm --filter @plot-pm/board test

      # ── Board integration tests: a real browser (Playwright) renders the just-
      #    built artifact against the tiny-garden fixture, asserting the mobile
      #    no-horizontal-scroll fix and the inline-sprint filter. ───────────────
      - name: Install Playwright browser
        run: pnpm --filter @plot-pm/board exec playwright install --with-deps chromium

      - name: Board integration tests (vitest + Playwright)
        run: pnpm --filter @plot-pm/board exec vitest run

      - name: Check for changeset
        if: github.event_name == 'pull_request'
        run: |
          # Find pending changeset files (not README.md or _template)
          changeset_files=$(find .changeset -name '*.md' -not -name 'README.md' -not -name '_template' 2>/dev/null || true)

          if [ -z "$changeset_files" ]; then
            echo "::warning::No changeset found. If this PR changes skills, run 'pnpm changeset' to add one."
            exit 0
          fi

          echo "Found changesets:"
          echo "$changeset_files"

          # Validate that bumps: block references existing skill directories
          echo "$changeset_files" | while IFS= read -r f; do
            [ -z "$f" ] && continue

            # Extract skill names from <!-- bumps: skills: skill-name: bump --> block
            awk '/^<!--/{c=1;next}/^-->/{c=0;next}c' "$f" | \
              awk '/skills:/{s=1;next} /^[[:space:]]{0,2}[a-z]/{s=0} s && /[a-z]/' | \
              sed 's/^[[:space:]]*//;s/[[:space:]]*:.*//' | \
            while IFS= read -r skill; do
              [ -z "$skill" ] && continue
              if [ ! -d "skills/$skill" ]; then
                echo "::error file=$f::bumps block references non-existent skill directory: '$skill'"
                exit 1
              fi
            done
          done

          echo "All changeset bumps references are valid."
